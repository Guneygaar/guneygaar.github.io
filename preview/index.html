<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SRTD.IO Preview</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  background: #1b1f23;
  font-family: 'DM Sans', sans-serif;
  color: #e6edf3;
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* TOP BAR */
.top-bar {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #111318;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 12px 16px;
  border-bottom: 1px solid rgba(255,255,255,0.08);
}
.top-bar-logo {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 14px;
  font-weight: 500;
  color: #e6edf3;
  letter-spacing: 1px;
}
.review-pill {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  color: #d4a017;
  border: 1.5px dotted #d4a017;
  border-radius: 20px;
  padding: 4px 12px;
  letter-spacing: 0.5px;
}

/* STATUS */
.status-msg {
  text-align: center;
  padding: 80px 16px;
  font-size: 16px;
  color: #8b949e;
}

/* ===== DESKTOP LAYOUT (768px+) ===== */
.desktop-view { display: none; }

@media (min-width: 768px) {
  .desktop-view { display: block; }
  .mobile-view { display: none; }

  .desktop-layout {
    display: grid;
    grid-template-columns: 1fr 1fr;
    max-width: 1080px;
    margin: 0 auto;
    min-height: calc(100vh - 44px);
  }

  /* Left: Image panel */
  .d-image-panel {
    background: #000000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 32px;
    position: relative;
    min-height: 0;
  }
  .d-main-image {
    max-width: 100%;
    max-height: 70vh;
    object-fit: contain;
    border-radius: 4px;
    user-select: none;
    -webkit-user-select: none;
  }
  .d-thumb-strip {
    display: flex;
    gap: 8px;
    margin-top: 16px;
    justify-content: center;
    flex-wrap: wrap;
  }
  .d-thumb {
    width: 56px;
    height: 56px;
    border-radius: 4px;
    object-fit: cover;
    cursor: pointer;
    opacity: 0.5;
    transition: opacity 0.15s;
    border: 2px solid transparent;
    user-select: none;
    -webkit-user-select: none;
  }
  .d-thumb.active {
    opacity: 1;
    border-color: rgba(200,168,75,0.6);
  }
  .d-image-counter {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 11px;
    color: #8b949e;
    margin-top: 10px;
  }

  /* Right: Content panel */
  .d-content-panel {
    padding: 32px 36px;
    display: flex;
    flex-direction: column;
    overflow-y: auto;
  }
  .d-header {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 20px;
  }
  .d-logo-wrap {
    width: 48px;
    height: 48px;
    border-radius: 4px;
    background: #fff;
    flex-shrink: 0;
    overflow: hidden;
  }
  .d-logo {
    object-fit: contain;
    padding: 3px;
    background: #fff;
    width: 100%;
    height: 100%;
  }
  .d-header-text {
    display: flex;
    flex-direction: column;
    gap: 2px;
  }
  .d-company {
    font-size: 14px;
    font-weight: 500;
    color: #e6edf3;
    line-height: 1.3;
  }
  .d-sub {
    font-size: 12px;
    color: #8b949e;
    line-height: 1.4;
  }
  .d-caption {
    font-size: 14px;
    line-height: 1.7;
    color: #d1d5db;
    word-break: break-word;
    flex: 1;
  }
  .d-footer {
    font-family: 'IBM Plex Mono', monospace;
    font-size: 10px;
    color: #666;
    letter-spacing: 0.08em;
    margin-top: 24px;
    padding: 20px 0 0;
    border-top: 1px solid rgba(255,255,255,0.05);
  }
}

/* ===== MOBILE LAYOUT (<768px) ===== */
.mobile-view { display: block; }

.mobile-card {
  display: flex;
  flex-direction: column;
}
.m-card {
  background: #000000;
  overflow: hidden;
  border: none;
  box-shadow: none;
}
.m-header {
  display: flex;
  align-items: flex-start;
  gap: 10px;
  padding: 16px 16px 0;
}
.m-logo-wrap {
  width: 56px;
  height: 56px;
  border-radius: 4px;
  background: #fff;
  flex-shrink: 0;
  overflow: hidden;
}
.m-logo {
  object-fit: contain;
  padding: 4px;
  background: #fff;
  width: 100%;
  height: 100%;
}
.m-header-text {
  display: flex;
  flex-direction: column;
  gap: 2px;
  min-width: 0;
}
.m-company {
  font-size: 14px;
  font-weight: 500;
  color: #e6edf3;
  line-height: 1.3;
}
.m-sub {
  font-size: 12px;
  color: #8b949e;
  line-height: 1.4;
}
.m-caption {
  padding: 12px 16px 14px;
  font-size: 14px;
  line-height: 1.7;
  color: #d1d5db;
  word-break: break-word;
}

/* Mobile image grid */
.m-image-grid {
  user-select: none;
  -webkit-user-select: none;
  position: relative;
}
.m-image-grid .m-grid-cell {
  user-select: none;
  -webkit-user-select: none;
  pointer-events: auto;
  cursor: pointer;
  display: block;
  overflow: hidden;
  position: relative;
}
.m-image-grid img {
  user-select: none;
  -webkit-user-select: none;
  -webkit-touch-callout: none;
  touch-action: manipulation;
  pointer-events: auto;
  cursor: pointer;
  display: block;
  width: 100%;
  height: 100%;
  object-fit: cover;
}
.m-grid-1 img {
  aspect-ratio: 4/3;
  height: auto;
}
.m-grid-2 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 2px;
}
.m-grid-2 .m-grid-cell { height: 260px; }
.m-grid-3 {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 1fr 1fr;
  gap: 2px;
  height: 260px;
}
.m-grid-3 .m-grid-cell:first-child { grid-row: 1 / 3; }
.m-grid-4plus {
  display: grid;
  grid-template-columns: 1fr 1fr;
  grid-template-rows: 150px 150px;
  gap: 2px;
  height: 300px;
}
.m-overlay-count {
  position: absolute;
  inset: 0;
  background: rgba(0,0,0,0.55);
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 16px;
  font-weight: 400;
  color: #fff;
  pointer-events: none;
}

/* Mobile footer */
.m-footer {
  padding: 16px 16px 24px 16px;
  text-align: center;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  color: #666;
  letter-spacing: 0.08em;
  border-top: 1px solid rgba(255,255,255,0.05);
}

/* LIGHTBOX */
.lightbox {
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: #000000;
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
}
.lightbox.active { display: flex; }
.lightbox-top {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 16px;
  z-index: 2;
}
.lightbox-close {
  background: none;
  border: none;
  color: #fff;
  font-size: 28px;
  cursor: pointer;
  line-height: 1;
  padding: 4px 8px;
  font-family: 'DM Sans', sans-serif;
}
.lightbox-counter {
  color: #8b949e;
  font-size: 14px;
  font-family: 'IBM Plex Mono', monospace;
}
.lightbox-img {
  max-width: 100%;
  max-height: 80vh;
  object-fit: contain;
}
.lightbox-nav {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  background: rgba(255,255,255,0.1);
  border: none;
  color: #fff;
  font-size: 32px;
  cursor: pointer;
  padding: 8px 14px;
  border-radius: 50%;
  z-index: 2;
  line-height: 1;
}
.lightbox-prev { left: 8px; }
.lightbox-next { right: 8px; }
</style>
</head>
<body>

<div class="top-bar">
  <div class="top-bar-logo">SRTD.IO</div>
  <div class="review-pill">FOR REVIEW ONLY</div>
</div>

<div id="app"></div>

<div class="lightbox" id="lightbox">
  <div class="lightbox-top">
    <button class="lightbox-close" id="lb-close" type="button">&#10005;</button>
    <span class="lightbox-counter" id="lb-counter"></span>
  </div>
  <button class="lightbox-nav lightbox-prev" id="lb-prev" type="button">&#8249;</button>
  <img class="lightbox-img" id="lb-img" alt="Preview image">
  <button class="lightbox-nav lightbox-next" id="lb-next" type="button">&#8250;</button>
</div>

<script>
(function() {
  var SUPABASE_URL = 'https://vxokfscjzytpgdrmertk.supabase.co';
  var SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InZ4b2tmc2Nqenl0cGdkcm1lcnRrIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzMzMzE2NzAsImV4cCI6MjA4ODkwNzY3MH0.j1LKb2FOarLIi5DDChiWF_DTihKdLCEQMKdy9M5JQkw';
  var LOGO_URL = 'https://pub-6a2a4aa8073d454ab9aeee69ef841635.r2.dev/post-assets/Godavari.jpg';

  var app = document.getElementById('app');

  function esc(str) {
    var el = document.createElement('div');
    el.textContent = str;
    return el.innerHTML;
  }

  function formatDate(dateStr) {
    if (!dateStr) return '';
    try {
      var d = new Date(dateStr);
      return d.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });
    } catch (e) {
      return '';
    }
  }

  function getShortId(postId) {
    if (!postId) return '';
    var str = String(postId);
    return str.slice(-4);
  }

  function styledHashtags(html) {
    return html.replace(/#(\w+)/g, '<span style="color:#378fe9">#$1</span>');
  }

  function stripFollow(caption) {
    return caption.split('\n').filter(function(line) {
      return !line.trim().match(/^follow\s/i);
    }).join('\n');
  }

  function buildCaptionHtml(caption, shortId, fullId) {
    if (!caption) return '';
    var allLines = caption.split('\n');
    var nonEmpty = [];
    for (var i = 0; i < allLines.length; i++) {
      if (allLines[i].trim() !== '') nonEmpty.push(allLines[i]);
    }
    var fullHtml = styledHashtags(esc(caption).replace(/\n/g, '<br>'));
    if (nonEmpty.length <= 4) return fullHtml;
    var truncHtml = styledHashtags(esc(nonEmpty.slice(0, 4).join('\n')).replace(/\n/g, '<br>'));
    return '<span id="caption-short-' + shortId + '">' + truncHtml +
      '<span class="js-more" data-target="' + fullId + '" data-hide="caption-short-' + shortId + '" style="color:#378fe9;cursor:pointer;font-weight:500;">...more</span></span>' +
      '<span id="' + fullId + '" style="display:none">' + fullHtml + '</span>';
  }

  /* ===== MOBILE IMAGE GRID ===== */
  function renderMobileImageGrid(images) {
    if (!images || images.length === 0) return '';
    var count = images.length;
    var html = '';
    if (count === 1) {
      html = '<div class="m-image-grid m-grid-1">' +
        '<img src="' + esc(images[0]) + '" alt="Post image" data-idx="0">' +
        '</div>';
    } else if (count === 2) {
      html = '<div class="m-image-grid m-grid-2">';
      for (var i = 0; i < 2; i++) {
        html += '<div class="m-grid-cell" data-idx="' + i + '"><img src="' + esc(images[i]) + '" alt="Post image"></div>';
      }
      html += '</div>';
    } else if (count === 3) {
      html = '<div class="m-image-grid m-grid-3">';
      for (var i = 0; i < 3; i++) {
        html += '<div class="m-grid-cell" data-idx="' + i + '"><img src="' + esc(images[i]) + '" alt="Post image"></div>';
      }
      html += '</div>';
    } else {
      html = '<div class="m-image-grid m-grid-4plus">';
      var show = Math.min(count, 4);
      for (var i = 0; i < show; i++) {
        html += '<div class="m-grid-cell" data-idx="' + i + '">';
        html += '<img src="' + esc(images[i]) + '" alt="Post image">';
        if (i === 3 && count > 4) {
          html += '<div class="m-overlay-count">+' + (count - 4) + '</div>';
        }
        html += '</div>';
      }
      html += '</div>';
    }
    return html;
  }

  /* ===== DESKTOP THUMBNAIL STRIP ===== */
  function renderDesktopThumbs(images) {
    if (!images || images.length < 2) return '';
    var html = '<div class="d-thumb-strip">';
    for (var i = 0; i < images.length; i++) {
      html += '<img class="d-thumb' + (i === 0 ? ' active' : '') + '" src="' + esc(images[i]) + '" alt="Thumbnail" data-idx="' + i + '">';
    }
    html += '</div>';
    html += '<div class="d-image-counter">1/' + images.length + '</div>';
    return html;
  }

  /* ===== RENDER POST ===== */
  function renderPost(post) {
    var date = post.status_changed_at || post.created_at;
    var caption = stripFollow(post.caption || post.description || '');
    var images = post.images || [];
    var dateStr = esc(formatDate(date));
    var firstImg = images.length > 0 ? esc(images[0]) : '';

    /* Desktop view */
    var desktopHtml = '<div class="desktop-view"><div class="desktop-layout">' +
      '<div class="d-image-panel">' +
        (firstImg ? '<img class="d-main-image" id="d-main-img" src="' + firstImg + '" alt="Post image">' : '') +
        renderDesktopThumbs(images) +
      '</div>' +
      '<div class="d-content-panel">' +
        '<div class="d-header">' +
          '<div class="d-logo-wrap"><img class="d-logo" src="' + esc(LOGO_URL) + '" alt="Godavari"></div>' +
          '<div class="d-header-text">' +
            '<div class="d-company">Godavari Biorefineries Limited</div>' +
            '<div class="d-sub">Sent for review &middot; ' + dateStr + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="d-caption">' + buildCaptionHtml(caption, 'dc', 'dc-full') + '</div>' +
        '<div class="d-footer">Sorted by Hinglish Agency</div>' +
      '</div>' +
    '</div></div>';

    /* Mobile view */
    var mobileHtml = '<div class="mobile-view"><div class="mobile-card">' +
      '<div class="m-card">' +
        '<div class="m-header">' +
          '<div class="m-logo-wrap"><img class="m-logo" src="' + esc(LOGO_URL) + '" alt="Godavari"></div>' +
          '<div class="m-header-text">' +
            '<div class="m-company">Godavari Biorefineries Limited</div>' +
            '<div class="m-sub">Sent for review &middot; ' + dateStr + '</div>' +
          '</div>' +
        '</div>' +
        '<div class="m-caption">' + buildCaptionHtml(caption, 'mc', 'mc-full') + '</div>' +
        renderMobileImageGrid(images) +
      '</div>' +
      '<div class="m-footer">Sorted by Hinglish Agency</div>' +
    '</div></div>';

    app.innerHTML = desktopHtml + mobileHtml;
    bindEvents(images);
  }

  /* ===== EVENT BINDING ===== */
  function bindEvents(images) {
    /* More buttons */
    var moreBtns = document.querySelectorAll('.js-more');
    for (var i = 0; i < moreBtns.length; i++) {
      moreBtns[i].addEventListener('click', function() {
        var target = this.getAttribute('data-target');
        var hide = this.getAttribute('data-hide');
        document.getElementById(hide).style.display = 'none';
        document.getElementById(target).style.display = '';
      });
    }

    /* Desktop thumbnails */
    var thumbs = document.querySelectorAll('.d-thumb');
    var mainImg = document.getElementById('d-main-img');
    var counter = document.querySelector('.d-image-counter');
    for (var i = 0; i < thumbs.length; i++) {
      thumbs[i].addEventListener('click', function() {
        var idx = parseInt(this.getAttribute('data-idx'), 10);
        if (mainImg) mainImg.src = images[idx];
        for (var j = 0; j < thumbs.length; j++) {
          thumbs[j].classList.remove('active');
        }
        this.classList.add('active');
        if (counter) counter.textContent = (idx + 1) + '/' + images.length;
      });
    }

    /* Mobile image grid click */
    var cells = app.querySelectorAll('.m-grid-cell, .m-grid-1 img');
    for (var i = 0; i < cells.length; i++) {
      cells[i].addEventListener('click', function() {
        var idx = this.getAttribute('data-idx');
        if (!idx) {
          var child = this.querySelector('[data-idx]');
          idx = child ? child.getAttribute('data-idx') : '0';
        }
        openLightbox(images, parseInt(idx, 10));
      });
    }
  }

  /* ===== LIGHTBOX ===== */
  var lbEl = document.getElementById('lightbox');
  var lbImg = document.getElementById('lb-img');
  var lbCounter = document.getElementById('lb-counter');
  var lbImages = [];
  var lbIdx = 0;
  var touchStartX = 0;

  function openLightbox(imgs, idx) {
    lbImages = imgs;
    lbIdx = idx;
    showLbImage();
    lbEl.classList.add('active');
  }

  function closeLightbox() {
    lbEl.classList.remove('active');
  }

  function showLbImage() {
    lbImg.src = lbImages[lbIdx];
    lbCounter.textContent = (lbIdx + 1) + '/' + lbImages.length;
  }

  function lbPrev() {
    lbIdx = (lbIdx - 1 + lbImages.length) % lbImages.length;
    showLbImage();
  }

  function lbNext() {
    lbIdx = (lbIdx + 1) % lbImages.length;
    showLbImage();
  }

  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-prev').addEventListener('click', lbPrev);
  document.getElementById('lb-next').addEventListener('click', lbNext);

  document.addEventListener('keydown', function(e) {
    if (!lbEl.classList.contains('active')) return;
    if (e.key === 'Escape') closeLightbox();
    if (e.key === 'ArrowLeft') lbPrev();
    if (e.key === 'ArrowRight') lbNext();
  });

  lbEl.addEventListener('touchstart', function(e) {
    touchStartX = e.changedTouches[0].clientX;
  }, { passive: true });

  lbEl.addEventListener('touchend', function(e) {
    var dx = e.changedTouches[0].clientX - touchStartX;
    if (Math.abs(dx) > 50) {
      if (dx < 0) lbNext(); else lbPrev();
    }
  }, { passive: true });

  /* ===== INIT ===== */
  function init() {
    var shortId = new URL(window.location.href)
      .searchParams.get('p') || '';
    if (!shortId) {
      app.innerHTML = '<div class="status-msg">Post not found.</div>';
      return;
    }

    app.innerHTML = '<div class="status-msg">Loading...</div>';

    fetch(SUPABASE_URL + '/rest/v1/posts?select=*', {
      headers: {
        'apikey': SUPABASE_ANON_KEY,
        'Authorization': 'Bearer ' + SUPABASE_ANON_KEY
      }
    })
    .then(function(res) { return res.json(); })
    .then(function(posts) {
      var match = null;
      for (var i = 0; i < posts.length; i++) {
        var pid = (posts[i].post_id || posts[i].id || '');
        var digits = pid.replace(/[^0-9]/g, '').slice(-4);
        if (digits === shortId) {
          match = posts[i];
          break;
        }
      }
      if (!match) {
        app.innerHTML = '<div class="status-msg">Post not found.</div>';
        return;
      }
      renderPost(match);
    })
    .catch(function() {
      app.innerHTML = '<div class="status-msg">Post not found.</div>';
    });
  }

  init();
})();
</script>
</body>
</html>
