<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 640" preserveAspectRatio="none">
  <defs>
    <filter id="metal" x="0" y="0" width="100%" height="100%">
      <feTurbulence type="fractalNoise" baseFrequency="1.2 0.4" numOctaves="5" seed="3" stitchTiles="stitch" result="n"/>
      <feColorMatrix type="saturate" values="0" in="n" result="grey"/>
      <feBlend in="SourceGraphic" in2="grey" mode="overlay" result="brushed"/>
      <feGaussianBlur in="brushed" stdDeviation="0.3"/>
    </filter>
    <linearGradient id="frameV" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#555"/>
      <stop offset="3%" stop-color="#444"/>
      <stop offset="10%" stop-color="#333"/>
      <stop offset="20%" stop-color="#2a2a2a"/>
      <stop offset="50%" stop-color="#252525"/>
      <stop offset="80%" stop-color="#2a2a2a"/>
      <stop offset="90%" stop-color="#333"/>
      <stop offset="97%" stop-color="#444"/>
      <stop offset="100%" stop-color="#555"/>
    </linearGradient>
    <linearGradient id="frameH" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.1)"/>
      <stop offset="5%" stop-color="rgba(255,255,255,0.03)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
      <stop offset="95%" stop-color="rgba(255,255,255,0.02)"/>
      <stop offset="100%" stop-color="rgba(255,255,255,0.07)"/>
    </linearGradient>
    <linearGradient id="topSheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="rgba(255,255,255,0.18)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <linearGradient id="botSheen" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="rgba(255,255,255,0.1)"/>
      <stop offset="50%" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <!-- Inner edge shadows -->
    <linearGradient id="shT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#000" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shB" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#000" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shL" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#000" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <linearGradient id="shR" x1="1" y1="0" x2="0" y2="0">
      <stop offset="0%" stop-color="#000" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#000" stop-opacity="0"/>
    </linearGradient>
    <!-- Bolt/rivet -->
    <radialGradient id="rivet">
      <stop offset="0%" stop-color="#666"/>
      <stop offset="30%" stop-color="#555"/>
      <stop offset="70%" stop-color="#3a3a3a"/>
      <stop offset="100%" stop-color="#2a2a2a"/>
    </radialGradient>
    <radialGradient id="rivetRing">
      <stop offset="70%" stop-color="transparent"/>
      <stop offset="85%" stop-color="rgba(0,0,0,0.5)"/>
      <stop offset="100%" stop-color="transparent"/>
    </radialGradient>
    <!-- Channel groove gradient -->
    <linearGradient id="grooveT" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#111"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
    <linearGradient id="grooveB" x1="0" y1="1" x2="0" y2="0">
      <stop offset="0%" stop-color="#111"/>
      <stop offset="100%" stop-color="#1a1a1a"/>
    </linearGradient>
  </defs>

  <!-- ===== OUTER SHELL ===== -->
  <!-- Absolute outer edge -->
  <rect x="0" y="0" width="420" height="640" rx="16" fill="#080808"/>
  <rect x="0" y="0" width="420" height="640" rx="16" fill="none" stroke="#000" stroke-width="2"/>

  <!-- Main frame body with brushed metal -->
  <rect x="3" y="3" width="414" height="634" rx="13" fill="url(#frameV)" filter="url(#metal)"/>

  <!-- Side bevel highlights -->
  <rect x="3" y="3" width="414" height="634" rx="13" fill="url(#frameH)"/>

  <!-- Top edge sheen -->
  <rect x="3" y="3" width="414" height="40" rx="13" fill="url(#topSheen)"/>

  <!-- Bottom edge sheen -->
  <rect x="3" y="597" width="414" height="40" rx="13" fill="url(#botSheen)"/>

  <!-- Inner edge line (frame inside lip) -->
  <rect x="5" y="5" width="410" height="630" rx="11" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

  <!-- ===== CHANNEL (screen recess) ===== -->
  <!-- Groove step 1 - outer channel -->
  <rect x="20" y="28" width="380" height="584" rx="8" fill="#1a1a1a"/>
  <rect x="20" y="28" width="380" height="5" rx="3" fill="url(#grooveT)"/>
  <rect x="20" y="607" width="380" height="5" rx="3" fill="url(#grooveB)"/>

  <!-- Groove step 2 - inner channel -->
  <rect x="22" y="30" width="376" height="580" rx="6" fill="#0e0e0e"/>

  <!-- Screen cutout -->
  <rect x="24" y="32" width="372" height="576" rx="5" fill="#050505"/>

  <!-- Channel edge lines -->
  <rect x="20" y="28" width="380" height="584" rx="8" fill="none" stroke="#0a0a0a" stroke-width="1.5"/>
  <rect x="24" y="32" width="372" height="576" rx="5" fill="none" stroke="#1a1a1a" stroke-width="0.5"/>
  <rect x="25" y="33" width="370" height="574" rx="4" fill="none" stroke="rgba(255,255,255,0.02)" stroke-width="0.5"/>

  <!-- Inner shadows on screen cutout -->
  <rect x="24" y="32" width="372" height="24" rx="5" fill="url(#shT)"/>
  <rect x="24" y="584" width="372" height="24" rx="5" fill="url(#shB)"/>
  <rect x="24" y="32" width="16" height="576" fill="url(#shL)"/>
  <rect x="380" y="32" width="16" height="576" fill="url(#shR)"/>

  <!-- ===== FRAME SEAMS ===== -->
  <!-- Horizontal seam - top -->
  <line x1="18" y1="26" x2="402" y2="26" stroke="#111" stroke-width="0.8"/>
  <line x1="18" y1="27" x2="402" y2="27" stroke="rgba(255,255,255,0.05)" stroke-width="0.3"/>
  <!-- Horizontal seam - bottom -->
  <line x1="18" y1="614" x2="402" y2="614" stroke="#111" stroke-width="0.8"/>
  <line x1="18" y1="615" x2="402" y2="615" stroke="rgba(255,255,255,0.05)" stroke-width="0.3"/>
  <!-- Vertical seam - left -->
  <line x1="18" y1="28" x2="18" y2="612" stroke="#111" stroke-width="0.8"/>
  <line x1="19" y1="28" x2="19" y2="612" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>
  <!-- Vertical seam - right -->
  <line x1="402" y1="28" x2="402" y2="612" stroke="#111" stroke-width="0.8"/>
  <line x1="401" y1="28" x2="401" y2="612" stroke="rgba(255,255,255,0.04)" stroke-width="0.3"/>

  <!-- ===== CORNER BRACKETS ===== -->
  <!-- Top-left corner bracket -->
  <path d="M6,20 L6,10 Q6,6 10,6 L20,6" fill="none" stroke="#444" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M7,20 L7,11 Q7,7 11,7 L20,7" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <!-- Top-right corner bracket -->
  <path d="M400,6 L410,6 Q414,6 414,10 L414,20" fill="none" stroke="#444" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M400,7 L409,7 Q413,7 413,11 L413,20" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <!-- Bottom-left corner bracket -->
  <path d="M6,620 L6,630 Q6,634 10,634 L20,634" fill="none" stroke="#444" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M7,620 L7,629 Q7,633 11,633 L20,633" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>
  <!-- Bottom-right corner bracket -->
  <path d="M400,634 L410,634 Q414,634 414,630 L414,620" fill="none" stroke="#444" stroke-width="1.5" stroke-linecap="round"/>
  <path d="M400,633 L409,633 Q413,633 413,629 L413,620" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="0.5"/>

  <!-- ===== RIVETS ===== -->
  <!-- Top row rivets -->
  <circle cx="30" cy="16" r="4.5" fill="url(#rivet)"/><circle cx="30" cy="16" r="4.5" fill="url(#rivetRing)"/>
  <circle cx="30" cy="16" r="4.5" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="27" y1="16" x2="33" y2="16" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round"/>

  <circle cx="390" cy="16" r="4.5" fill="url(#rivet)"/><circle cx="390" cy="16" r="4.5" fill="url(#rivetRing)"/>
  <circle cx="390" cy="16" r="4.5" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="387" y1="16" x2="393" y2="16" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round"/>

  <!-- Top center rivets -->
  <circle cx="170" cy="16" r="3" fill="url(#rivet)"/><circle cx="170" cy="16" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
  <circle cx="210" cy="16" r="3" fill="url(#rivet)"/><circle cx="210" cy="16" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
  <circle cx="250" cy="16" r="3" fill="url(#rivet)"/><circle cx="250" cy="16" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>

  <!-- Bottom row rivets -->
  <circle cx="30" cy="624" r="4.5" fill="url(#rivet)"/><circle cx="30" cy="624" r="4.5" fill="url(#rivetRing)"/>
  <circle cx="30" cy="624" r="4.5" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="27" y1="624" x2="33" y2="624" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round"/>

  <circle cx="390" cy="624" r="4.5" fill="url(#rivet)"/><circle cx="390" cy="624" r="4.5" fill="url(#rivetRing)"/>
  <circle cx="390" cy="624" r="4.5" fill="none" stroke="#1a1a1a" stroke-width="0.8"/>
  <line x1="387" y1="624" x2="393" y2="624" stroke="#1a1a1a" stroke-width="1" stroke-linecap="round"/>

  <!-- Bottom center rivets -->
  <circle cx="170" cy="624" r="3" fill="url(#rivet)"/><circle cx="170" cy="624" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
  <circle cx="210" cy="624" r="3" fill="url(#rivet)"/><circle cx="210" cy="624" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
  <circle cx="250" cy="624" r="3" fill="url(#rivet)"/><circle cx="250" cy="624" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>

  <!-- Side rivets - left -->
  <circle cx="10" cy="200" r="3" fill="url(#rivet)"/><circle cx="10" cy="200" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
  <circle cx="10" cy="320" r="3" fill="url(#rivet)"/><circle cx="10" cy="320" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
  <circle cx="10" cy="440" r="3" fill="url(#rivet)"/><circle cx="10" cy="440" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>

  <!-- Side rivets - right -->
  <circle cx="410" cy="200" r="3" fill="url(#rivet)"/><circle cx="410" cy="200" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
  <circle cx="410" cy="320" r="3" fill="url(#rivet)"/><circle cx="410" cy="320" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>
  <circle cx="410" cy="440" r="3" fill="url(#rivet)"/><circle cx="410" cy="440" r="3" fill="none" stroke="#1a1a1a" stroke-width="0.6"/>

  <!-- ===== STATUS LEDs (top-left) ===== -->
  <circle cx="44" cy="16" r="2.5" fill="#2a0a0a"/>
  <circle cx="44" cy="16" r="1.5" fill="#992222" opacity="0.9"/>
  <circle cx="44" cy="16" r="0.8" fill="#cc3333" opacity="0.6"/>

  <circle cx="54" cy="16" r="2.5" fill="#2a2a0a"/>
  <circle cx="54" cy="16" r="1.5" fill="#999922" opacity="0.9"/>
  <circle cx="54" cy="16" r="0.8" fill="#cccc33" opacity="0.6"/>

  <circle cx="64" cy="16" r="2.5" fill="#0a2a0a"/>
  <circle cx="64" cy="16" r="1.5" fill="#229922" opacity="0.9"/>
  <circle cx="64" cy="16" r="0.8" fill="#33cc33" opacity="0.6"/>
</svg>